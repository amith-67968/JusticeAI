services:
  - type: web
    runtime: python
    name: justiceai-backend
    rootDir: Backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: false
      - key: SUPABASE_DOCUMENTS_TABLE
        value: documents
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
